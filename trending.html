    <script>
        async function fetchTrending() {
            const grid = document.getElementById('trendingGrid');
            const API_KEY = '014fbdbe962cb38379e09e31d0652459';
            const url = `https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    grid.innerHTML = data.results.map(item => {
                        const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'default-poster.jpg';
                        const title = item.name || item.title || "Unknown Title";
                        const rating = item.vote_average ? item.vote_average.toFixed(1) : "N/A";
                        const year = (item.first_air_date || item.release_date || "N/A").substring(0, 4);

                        return `
                            <a href="watch.html?id=${item.id}" class="drama-card">
                                <div class="drama-card-img">
                                    <img src="${poster}" alt="${title}" onerror="this.src='default-poster.jpg'">
                                </div>
                                <div class="drama-card-info">
                                    <h3 class="drama-card-title">${title}</h3>
                                    <div class="drama-card-meta">
                                        <span>${year}</span> • <span><i class="fas fa-star" style="color: #fbbf24;"></i> ${rating}</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    }).join('');
                } else {
                    grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:var(--text-muted-color);">No trending items found.</p>';
                }
            } catch (err) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:var(--text-muted-color);">Error loading content from TMDB API.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchTrending();

            const mSearch = document.getElementById('mobileSearchInput');
            const mResults = document.getElementById('mobileSearchResults');
            const pcSearch = document.getElementById('searchInput');
            const pcResults = document.getElementById('searchResults');
            
            if(mSearch && pcSearch) {
                mSearch.addEventListener('input', (e) => {
                    pcSearch.value = e.target.value;
                    pcSearch.dispatchEvent(new Event('input')); 
                });
                const observer = new MutationObserver(() => {
                    mResults.innerHTML = pcResults.innerHTML;
                    mResults.style.display = pcResults.style.display;
                });
                if(pcResults) observer.observe(pcResults, { childList: true, attributes: true, subtree: true });
            }

            // Fire layout ad calls
            setTimeout(() => {
                const staticAds = document.querySelectorAll('.adsbygoogle');
                staticAds.forEach(() => {
                    try { (adsbygoogle = window.adsbygoogle || []).push({}); } 
                    catch (e) { console.error("Ad block rendering exception", e); }
                });
            }, 800);
        });
    </script>
