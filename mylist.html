<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My List - DramaKan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="indexstyle.css">
    <link rel="stylesheet" href="bottom-bar.css"> 

    <style>
        body { 
            padding-bottom: 90px; 
            background-color: var(--background-color); 
        }
        
        .mylist-container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 0 4%; 
            animation: fadeIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }

        .page-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* GRIDS & CARDS OVERRIDE FOR STANDALONE LIST PAGE */
        .drama-grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
        }
        .item-wrapper { 
            position: relative; 
            transition: transform 0.3s; 
            height: 100%; 
            display: flex; 
        }
        .item-wrapper:hover { 
            transform: translateY(-5px); 
            z-index: 5; 
        }
        
        /* Premium Card Rules */
        .drama-grid-container .drama-card {
            min-width: 100% !important;
            max-width: 100% !important;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            background: linear-gradient(145deg, rgba(30,30,35,0.4) 0%, rgba(15,15,20,0.6) 100%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .drama-grid-container .drama-card-img {
            width: 100%;
            aspect-ratio: 2.7 / 4; 
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            flex-shrink: 0;
        }
        .drama-grid-container .drama-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .item-wrapper:hover .drama-card-img img {
            transform: scale(1.08);
        }
        .drama-grid-container .drama-card-info {
            padding: 16px;
            background: transparent;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .drama-grid-container .drama-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* FLOATING REMOVE BUTTONS (GLASS RED) */
        .remove-btn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(239, 68, 68, 0.85); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; 
            border-radius: 50%; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5); 
            opacity: 0; 
            transform: scale(0.8); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-wrapper:hover .remove-btn { opacity: 1; transform: scale(1); }
        .remove-btn:hover { background: #ef4444; transform: scale(1.15) !important; }

        /* EMPTY & LOADING STATES */
        .empty-state, .loading-state { 
            text-align: center; 
            padding: 80px 20px; 
            color: var(--text-muted-color); 
            background: rgba(26, 26, 29, 0.4); 
            border-radius: 24px; 
            border: 1px dashed rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            grid-column: 1 / -1;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; color: rgba(157, 78, 221, 0.3); }
        .empty-state h3 { font-weight: 500; font-size: 1.2rem; color: #e4e4e7; }
        .loading-state i { font-size: 3rem; margin-bottom: 20px; color: var(--primary-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .mylist-container { margin: 20px auto; padding: 0 5%; }
            .drama-grid-container { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 15px; }
            .remove-btn { opacity: 1; transform: scale(1); top: 8px; right: 8px; width: 30px; height: 30px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" class="logo">Drama<span>Kan</span></a>
            <a href="index.html" style="color: var(--text-muted-color); font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.3s;">
                <i class="fas fa-arrow-left"></i> Home
            </a>
        </div>
    </header>

    <main class="mylist-container">
        <div class="page-header">
            <i class="fas fa-bookmark" style="font-size: 1.8rem; color: var(--primary-color);"></i>
            <h1 class="page-title">My List</h1>
        </div>

        <div class="drama-grid-container" id="mylist-grid-container">
            <div class="loading-state" id="loading-spinner">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Loading your saved dramas...</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="community.html" class="bottom-nav-item">
            <i class="fa-solid fa-users nav-icon"></i>
            <span class="nav-label">Community</span>
        </a>
        <a href="mylist.html" class="bottom-nav-item active">
            <i class="fa-solid fa-bookmark nav-icon"></i>
            <span class="nav-label">My List</span>
        </a>
        <a href="login.html" class="bottom-nav-item" id="bottomAuthBtn">
            <i class="fa-solid fa-user nav-icon"></i>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script type="module" src="/js/bottom-bar.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", 
            authDomain: "dramakan007.firebaseapp.com", 
            projectId: "dramakan007" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        let currentUserDocRef = null;

        // Render Function
        window.renderMyList = function(listArray) {
            const myListGrid = document.getElementById('mylist-grid-container');
            
            if (listArray && listArray.length > 0) {
                myListGrid.innerHTML = listArray.reverse().map(item => `
                    <div class="item-wrapper">
                        <a href="${item.link}" class="drama-card">
                            <div class="drama-card-img"><img src="${item.img}" alt="${item.title}"></div>
                            <div class="drama-card-info">
                                <h3 class="drama-card-title">${item.title}</h3>
                            </div>
                        </a>
                        <button class="remove-btn" onclick="removeFromMyList('${item.title.replace(/'/g, "\\'")}')" title="Remove from My List">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `).join('');
            } else {
                myListGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bookmark"></i>
                        <h3>Your list is empty</h3>
                        <p style="font-size:0.9rem; margin-top:10px;">Find dramas you like and tap the + button to save them here.</p>
                        <a href="index.html" style="display:inline-block; margin-top:20px; padding: 10px 24px; background:var(--primary-color); color:#fff; border-radius:50px; text-decoration:none; font-weight:500;">Browse Dramas</a>
                    </div>`;
            }
        };

        // Remove Function
        window.removeFromMyList = async function(title) {
            if (currentUserDocRef) {
                try {
                    const docSnap = await getDoc(currentUserDocRef);
                    if (docSnap.exists()) {
                        let list = docSnap.data().myList || [];
                        // Filter out the specific title
                        list = list.filter(item => item.title !== title);
                        // Update Firebase
                        await updateDoc(currentUserDocRef, { myList: list });
                        // Re-render UI
                        renderMyList(list);
                    }
                } catch (error) {
                    console.error("Error removing item:", error);
                    alert("Failed to remove item. Please try again.");
                }
            }
        };

        // Auth Listener - Fetch Data on Load
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserDocRef = doc(db, "users", user.uid);
                try {
                    const docSnap = await getDoc(currentUserDocRef);
                    if (docSnap.exists()) {
                        renderMyList(docSnap.data().myList || []);
                    } else {
                        renderMyList([]);
                    }
                } catch (error) {
                    console.error("Error fetching list:", error);
                    document.getElementById('mylist-grid-container').innerHTML = `<div class="empty-state"><h3>Error loading list. Refresh the page.</h3></div>`;
                }
            } else {
                // Not logged in -> Redirect to login
                window.location.replace('login.html'); 
            }
        });
    </script>
</body>
</html>
