<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Drama - DramaKan</title>
    
    <meta http-equiv="x-dns-prefetch-control" content="off">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bottom-bar.css"> 

    <style>
        :root {
            --bg-base: #0B0C10; 
            --primary: #8A2BE2; 
            --primary-rich: #6a1b9a;
            --primary-glow: rgba(138, 43, 226, 0.4); 
            --glass-bg: linear-gradient(145deg, rgba(20, 20, 25, 0.6) 0%, rgba(10, 10, 15, 0.8) 100%);
            --glass-border: rgba(138, 43, 226, 0.15); 
            --glass-blur: blur(20px);
            --glass-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.6);
            --text-main: #F8F8F8;
            --text-muted: #a1a1aa;
            --nf-btn-bg: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #page-loader { position: fixed; inset: 0; background: var(--bg-base); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; color: #fff; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-header {
            background: transparent;
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 15px 4%;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .logo span { color: var(--primary); }
        .header-actions { display: flex; gap: 15px; }
        .header-icon { color: #fff; font-size: 1.2rem; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Netflix-style layout container */
        .nf-container {
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 100px; /* Space for bottom bar */
        }

        /* Player Area */
        .video-player-container {
            position: relative; 
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            z-index: 10;
        }
        .video-player-container iframe { width: 100%; height: 100%; border: none; }
        .click-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; background: transparent; }

        /* Meta Info Area */
        .nf-info-block {
            padding: 20px 4%;
        }
        .nf-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }
        .nf-meta-tags {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 500;
        }
        .nf-badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #fff;
        }
        .nf-imdb { color: #f5c518; font-weight: 600; display: flex; align-items: center; gap: 4px;}

        /* Primary Action Buttons */
        .nf-primary-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nf-btn-play {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nf-btn-play:hover { background: #e6e6e6; }
        .nf-btn-download {
            background: var(--nf-btn-bg);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nf-btn-download:hover { background: rgba(255,255,255,0.2); }

        .nf-synopsis {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #fff;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .nf-synopsis.expanded { -webkit-line-clamp: unset; }
        .nf-read-more { color: var(--text-muted); font-size: 0.85rem; cursor: pointer; font-weight: 500; margin-bottom: 20px; display: inline-block; }

        /* Secondary Action Row (My List, Rate, Share, Download) */
        .nf-action-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px 20px 20px;
            max-width: 400px;
        }
        .nf-action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
            position: relative;
        }
        .nf-action-item:hover, .nf-action-item.active-action { color: #fff; }
        .nf-action-item i { font-size: 1.4rem; }
        .nf-action-item span { font-size: 0.7rem; font-weight: 500; }

        /* Rate Popup */
        .nf-rate-popup {
            position: absolute;
            bottom: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: rgba(30, 30, 35, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            display: flex;
            gap: 20px;
            padding: 12px 25px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }
        .nf-rate-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }
        .nf-rate-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .nf-rate-option:hover { transform: scale(1.1); color: var(--primary); }
        .nf-rate-option i { font-size: 1.5rem; }
        .nf-rate-option span { font-size: 0.65rem; white-space: nowrap; }

        /* Tabs Navigation */
        .nf-tabs-nav {
            display: flex;
            gap: 20px;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .nf-tabs-nav::-webkit-scrollbar { display: none; }
        .nf-tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins';
            cursor: pointer;
            padding-bottom: 5px;
            white-space: nowrap;
            position: relative;
        }
        .nf-tab-btn.active { color: #fff; }
        .nf-tab-btn.active::after {
            content: '';
            position: absolute;
            top: -17px; /* Align with top border */
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 2px 10px var(--primary-glow);
        }

        .nf-tab-content { display: none; animation: fadeIn 0.3s ease; }
        .nf-tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Server & Season Selectors */
        .nf-selectors { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nf-select { 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 4px; 
            font-family: 'Poppins', sans-serif; 
            font-size: 0.9rem; 
            font-weight: 500; 
            outline: none; 
            cursor: pointer; 
        }
        .nf-select option { background: #1a1a1d; color: #fff; }

        /* Server Pills (Dramakan specific feature kept clean) */
        .server-pills { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; margin-bottom: 20px;}
        .server-pills::-webkit-scrollbar { display: none; }
        .s-pill { background: rgba(255,255,255,0.1); color: var(--text-muted); border: none; padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; white-space: nowrap;}
        .s-pill.active { background: var(--primary); color: #fff; box-shadow: 0 0 10px var(--primary-glow); }

        /* Episodes Vertical List (Netflix Style) */
        .nf-episodes-list { display: flex; flex-direction: column; gap: 15px; }
        .nf-episode-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            transition: background 0.3s;
            cursor: pointer;
        }
        .nf-episode-item:hover { background: rgba(255,255,255,0.08); }
        .nf-episode-item.current { background: rgba(138, 43, 226, 0.15); border-left: 3px solid var(--primary); }
        .nf-ep-thumb {
            position: relative;
            width: 120px;
            height: 68px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background: #222;
        }
        .nf-ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7;}
        .nf-ep-play-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        .nf-ep-info { flex: 1; }
        .nf-ep-title { font-size: 1rem; font-weight: 500; color: #fff; margin: 0 0 4px 0; }
        .nf-ep-desc { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
        .nf-ep-download-icon { color: #fff; font-size: 1.2rem; padding: 10px; }

        /* Recommendations List */
        .nf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .nf-grid-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; }

        /* Glassmorphism Widget Overrides for Tab Content */
        .widget {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 20px; margin-bottom: 20px; box-shadow: var(--glass-shadow); 
        }
        .widget-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 8px;}

        /* Cast List (Glassmorphism) */
        .cast-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cast-list::-webkit-scrollbar { display: none; }
        .cast-card { display: flex; flex-direction: column; align-items: center; min-width: 90px; text-align: center; }
        .cast-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 8px;}
        .actor-name { margin: 0; font-size: 0.85rem; color:#fff; font-weight: 500; line-height: 1.2;}
        .character-name { margin: 0; font-size: 0.7rem; color: var(--text-muted); }

        /* Comments Form override */
        .comment-form-container { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; display: flex; gap: 15px; margin-bottom: 20px;}
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .comment-input-wrapper { flex: 1; display: flex; flex-direction: column; gap: 10px;}
        .comment-input-wrapper textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; padding: 10px; outline: none; resize: vertical; min-height: 60px; font-family: 'Poppins'; font-size: 0.85rem;}
        .comment-actions button { background: var(--primary); border: none; color: #fff; padding: 8px 20px; border-radius: 50px; font-family: 'Poppins'; font-weight: 500; cursor: pointer;}
        
        .comment-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; }

        /* Apple Liquid Glass Bottom Nav (Original Strict CSS untouched) */
        @media (max-width: 992px) {
            .bottom-nav { display: flex !important; position: fixed !important; bottom: 10px !important; left: 50% !important; transform: translateX(-50%) !important; width: 90% !important; max-width: 400px !important; background: rgba(20, 20, 25, 0.45) !important; backdrop-filter: blur(40px) saturate(180%) !important; -webkit-backdrop-filter: blur(40px) saturate(180%) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important; border-top: 1px solid rgba(255, 255, 255, 0.25) !important; border-radius: 50px !important; z-index: 9999 !important; padding: 5px 10px !important; box-shadow: 0 25px 50px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1) !important; }
            .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 0; color: rgba(255, 255, 255, 0.5); transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); position: relative; text-decoration: none; }
            .bottom-nav-item.active { color: #fff; text-shadow: 0 0 15px var(--primary-glow); }
            .nav-icon { font-size: 1.35rem; margin-bottom: 4px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
            .bottom-nav-item.active .nav-icon { transform: translateY(-4px) scale(1.15); color: var(--primary); filter: drop-shadow(0 5px 12px var(--primary-glow)); }
            .nav-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.3px; transition: all 0.3s ease; }
            .bottom-nav-item.active .nav-label { font-weight: 700; }
        }
        @media (min-width: 993px) { .bottom-nav { display: none !important; } }
    </style>
    <script src="bottom-bar.js" defer></script>
    <script src="lightmode.js"></script> 
    <link rel="stylesheet" href="lightmode.css"> 
</head>
<body>

    <header class="main-header">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, addDoc, serverTimestamp, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
            authDomain: "dramakan007.firebaseapp.com",
            projectId: "dramakan007"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 

        let currentServer = 'vsrc'; 
        let dramaPosterGlobal = '';

        // Tab Switching Logic
        const tabBtns = document.querySelectorAll('.nf-tab-btn');
        const tabContents = document.querySelectorAll('.nf-tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // Rate Popup Logic
        const rateBtnContainer = document.getElementById('rate-btn-container');
        const ratePopup = document.getElementById('rate-popup');
        const rateIcon = document.getElementById('rate-icon');

        rateBtnContainer.addEventListener('click', (e) => {
            if (e.target.closest('.nf-rate-popup')) return; 
            ratePopup.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!rateBtnContainer.contains(e.target)) {
                ratePopup.classList.remove('show');
            }
        });

        window.handleRate = function(type) {
            ratePopup.classList.remove('show');
            if(type === 'up' || type === 'love') {
                rateIcon.className = 'fas fa-thumbs-up';
                rateBtnContainer.classList.add('active-action');
            } else {
                rateIcon.className = 'far fa-thumbs-down';
                rateBtnContainer.classList.remove('active-action');
            }
        };

        // Share API
        document.getElementById('share-btn').addEventListener('click', async () => {
            const shareData = {
                title: document.title,
                text: 'Watch this drama on DramaKan!',
                url: window.location.href
            };
            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Link copied to clipboard!");
                }
            } catch (err) { console.error('Share failed', err); }
        });

        // Main Logic
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dramaId = urlParams.get('id');

            if (!dramaId) { window.location.replace('index.html'); return; }

            // Server Selection
            const serverBtns = document.querySelectorAll('.s-pill');
            serverBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    serverBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentServer = e.target.getAttribute('data-server');
                    if (window.currentSeason && window.currentEpisode) {
                        window.loadEpisode(window.currentSeason, window.currentEpisode);
                    }
                });
            });

            try {
                let allDramas = JSON.parse(localStorage.getItem('dramakan_master_db'));
                if (!allDramas) {
                    const response = await fetch('/dramas.json');
                    allDramas = await response.json();
                }

                const data = allDramas.find(drama => drama.id === dramaId);

                if (data) {
                    dramaPosterGlobal = data.img;
                    document.title = `Watch ${data.title} - DramaKan`;
                    document.getElementById('ui-title').textContent = data.title;
                    document.getElementById('synopsis-text').textContent = data.synopsis;
                    document.getElementById('ui-type').textContent = data.type;
                    document.getElementById('ui-total-eps-text').textContent = `${data.totalEps} Episodes`;
                    document.getElementById('ui-status').textContent = data.status;
                    document.getElementById('ui-score').textContent = data.imdb;
                    document.getElementById('ui-genre').textContent = data.genre;
                    document.getElementById('ui-cast1-name').textContent = data.actor1;
                    document.getElementById('ui-cast1-img').src = data.actor1Img;
                    document.getElementById('ui-cast2-name').textContent = data.actor2;
                    document.getElementById('ui-cast2-img').src = data.actor2Img;

                    loadRecommendations(dramaId);
                    initCommentSystem(dramaId); 

                    // Play Button Action
                    document.getElementById('nf-play-btn').addEventListener('click', () => {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });

                    // My List Sync
                    const bookmarkBtn = document.getElementById('add-to-list-btn');
                    const listIcon = document.getElementById('list-icon');
                    const safeTitle = data.title;
                    const safeLink = window.location.pathname + window.location.search;

                    const syncBookmarkUI = function() {
                        let currentList = JSON.parse(localStorage.getItem('dramakan_mylist')) || [];
                        if (currentList.some(item => item.link === safeLink || item.id === dramaId)) {
                            listIcon.className = 'fas fa-check';
                            bookmarkBtn.classList.add('active-action');
                        } else {
                            listIcon.className = 'fas fa-plus';
                            bookmarkBtn.classList.remove('active-action');
                        }
                    };
                    syncBookmarkUI(); 

                    bookmarkBtn.addEventListener('click', (e) => {
                        let currentList = JSON.parse(localStorage.getItem('dramakan_mylist')) || [];
                        const existsIndex = currentList.findIndex(item => item.link === safeLink || item.id === dramaId);
                        if (existsIndex > -1) { currentList.splice(existsIndex, 1); } 
                        else { currentList.push({ id: dramaId, title: safeTitle, img: data.img, link: safeLink }); }
                        localStorage.setItem('dramakan_mylist', JSON.stringify(currentList));
                        syncBookmarkUI(); 
                    });

                    // Read More logic
                    const readMoreBtn = document.getElementById('read-more-btn');
                    readMoreBtn.addEventListener('click', () => {
                        const syn = document.getElementById('synopsis-text');
                        syn.classList.toggle('expanded');
                        readMoreBtn.textContent = syn.classList.contains('expanded') ? 'Read less' : 'Read more';
                    });

                    // Episodes Setup
                    let seasonsArr = data.seasons || [data.totalEps || 1];
                    window.currentSeason = 1;
                    window.currentEpisode = 1;

                    const seasonSelector = document.getElementById('season-selector');
                    const grid = document.getElementById('episodes-list-container');

                    if (seasonsArr.length > 1) {
                        seasonSelector.style.display = 'block';
                        seasonSelector.innerHTML = seasonsArr.map((_, idx) => `<option value="${idx + 1}">Season ${idx + 1}</option>`).join('');
                    } else {
                        document.getElementById('current-ep-display').textContent = 'Season 1';
                    }

                    function renderEpisodeGrid(seasonNum) {
                        window.currentSeason = parseInt(seasonNum);
                        const epsInThisSeason = seasonsArr[window.currentSeason - 1];
                        
                        let html = '';
                        for (let i = 1; i <= epsInThisSeason; i++) {
                            const dlLink = `https://dl.vidsrc.vip/tv/${data.imdbId}/${window.currentSeason}/${i}`;
                            html += `
                                <div class="nf-episode-item" data-season="${window.currentSeason}" data-index="${window.currentSeason}-${i}">
                                    <div class="nf-ep-thumb">
                                        <img src="${data.img}" alt="EP Thumbnail">
                                        <i class="fas fa-play nf-ep-play-icon"></i>
                                    </div>
                                    <div class="nf-ep-info">
                                        <h4 class="nf-ep-title">${i}. Episode ${i}</h4>
                                        <p class="nf-ep-desc">Season ${window.currentSeason}</p>
                                    </div>
                                    <a href="${dlLink}" target="_blank" class="nf-ep-download-icon" onclick="event.stopPropagation();">
                                        <i class="fas fa-download"></i>
                                    </a>
                                </div>`;
                        }
                        grid.innerHTML = html;
                        updateActiveButton();
                    }

                    function updateActiveButton() {
                        document.querySelectorAll('.nf-episode-item').forEach((item) => {
                            const isMatch = parseInt(item.dataset.season) === window.currentSeason && item.getAttribute('data-index') === `${window.currentSeason}-${window.currentEpisode}`;
                            item.classList.toggle('current', isMatch);
                        });
                        document.getElementById('current-ep-display').textContent = `S${window.currentSeason} E${window.currentEpisode}`;
                    }

                    const videoPlayer = document.getElementById('video-player-iframe');

                    async function fetchCleanVideoSource(imdbId, season, episode, mediaType) {
                        const isMovie = mediaType && mediaType.toLowerCase().includes('movie');
                        if (currentServer === 'vsrc') {
                            return isMovie ? `https://vidsrc.fyi/embed/movie/${imdbId}` : `https://vidsrc.fyi/embed/tv/${imdbId}/${season}/${episode}`;
                        } else if (currentServer === 'hindi') {
                            return `https://loffe414wil.com/play/${imdbId}`;
                        } else {
                            return isMovie ? `https://www.2embed.cc/embed/${imdbId}` : `https://www.2embed.cc/embedtv/${imdbId}&s=${season}&e=${episode}`;
                        }
                    }

                    window.loadEpisode = async function(seasonNum, epNum) {
                        window.currentSeason = parseInt(seasonNum);
                        window.currentEpisode = parseInt(epNum);
                        
                        if (parseInt(seasonSelector.value) !== window.currentSeason) {
                            seasonSelector.value = window.currentSeason;
                            renderEpisodeGrid(window.currentSeason);
                        }

                        if (currentServer === 'hindi') {
                            videoPlayer.removeAttribute('referrerpolicy'); 
                            videoPlayer.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');
                        } else if (currentServer === '2embed') {
                            videoPlayer.removeAttribute('sandbox'); 
                            videoPlayer.setAttribute('referrerpolicy', 'no-referrer');
                        } else {
                            videoPlayer.removeAttribute('sandbox');
                            videoPlayer.removeAttribute('referrerpolicy'); 
                        }

                        const embedLink = await fetchCleanVideoSource(data.imdbId, window.currentSeason, window.currentEpisode, data.type);
                        videoPlayer.src = embedLink;

                        // Main download button sync
                        document.getElementById('nf-main-download-btn').onclick = () => {
                            window.open(`https://dl.vidsrc.vip/tv/${data.imdbId}/${window.currentSeason}/${window.currentEpisode}`, '_blank');
                        };
                        
                        updateActiveButton();

                        const epIndexToSave = `${window.currentSeason}-${window.currentEpisode}`;
                        localStorage.setItem(`dramakan_ep_${dramaId}`, epIndexToSave);
                        
                        let history = JSON.parse(localStorage.getItem('dramakan_history')) || {};
                        history[dramaId] = { title: data.title, img: data.img, link: window.location.pathname + window.location.search, timestamp: Date.now(), epIndex: epIndexToSave };
                        localStorage.setItem('dramakan_history', JSON.stringify(history));
                    }

                    seasonSelector.addEventListener('change', (e) => { renderEpisodeGrid(e.target.value); });
                    
                    grid.addEventListener('click', (e) => {
                        const item = e.target.closest('.nf-episode-item');
                        if (item) {
                            const parts = item.getAttribute('data-index').split('-');
                            window.loadEpisode(parts[0], parts[1]);
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    });

                    renderEpisodeGrid(1);

                    setTimeout(() => {
                        const savedEpRaw = localStorage.getItem(`dramakan_ep_${dramaId}`);
                        if (savedEpRaw && savedEpRaw !== "0" && savedEpRaw.includes('-')) {
                            const parts = savedEpRaw.split('-');
                            window.loadEpisode(parts[0], parts[1]);
                        } else {
                            window.loadEpisode(1, 1);
                        }
                        document.getElementById('page-loader').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                    }, 500);

                } else { window.location.replace('index.html'); }
            } catch (error) { console.error("Error loading drama:", error); }

            function initCommentSystem(dramaId) {
                const commentsListEl = document.getElementById('comments-list');
                const commentInput = document.getElementById('comment-text-input');
                let submitBtn = document.getElementById('submit-comment-btn');
                const avatarEl = document.getElementById('current-user-avatar');
                const commentForm = document.getElementById('comment-form');
                let activeUserName = null;
                let activeUserAvatar = null;

                const applyAuthState = (isLoggedIn, name, avatarUrl) => {
                    if (isLoggedIn) {
                        activeUserName = name;
                        activeUserAvatar = avatarUrl;
                        if (avatarEl) avatarEl.src = avatarUrl;
                        commentInput.placeholder = "Join the discussion...";
                        commentInput.disabled = false;
                        submitBtn.disabled = false;
                        submitBtn.textContent = "Post";
                    } else {
                        commentInput.placeholder = "Please log in to join the discussion...";
                        submitBtn.textContent = "Login";
                        submitBtn.disabled = false;
                        submitBtn.addEventListener('click', () => window.location.href = 'login.html');
                    }
                };

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const name = user.displayName || (user.email ? user.email.split('@')[0] : "User");
                        const avatar = user.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${name}`;
                        applyAuthState(true, name, avatar);
                    } else { applyAuthState(false); }
                });

                commentForm.onsubmit = async (e) => {
                    e.preventDefault();
                    if (!activeUserName) return;
                    const text = commentInput.value.trim();
                    if (!text) return;
                    submitBtn.disabled = true;
                    submitBtn.textContent = '...';
                    try {
                        await addDoc(collection(db, "comments"), { dramaId, text, user: activeUserName, userImg: activeUserAvatar, timestamp: serverTimestamp() });
                        commentInput.value = ''; 
                    } catch (err) {} finally {
                        submitBtn.disabled = false; submitBtn.textContent = 'Post';
                    }
                };

                onSnapshot(query(collection(db, "comments"), where("dramaId", "==", dramaId)), (snapshot) => {
                    if (snapshot.empty) { commentsListEl.innerHTML = `<p style="color:var(--text-muted);font-size:0.9rem;text-align:center;">No comments yet.</p>`; return; }
                    let commentsArr = [];
                    snapshot.forEach(docSnap => commentsArr.push({ id: docSnap.id, ...docSnap.data() }));
                    commentsArr.sort((a, b) => (b.timestamp?.toMillis() || Date.now()) - (a.timestamp?.toMillis() || Date.now()));
                    commentsListEl.innerHTML = commentsArr.map(c => `
                        <div class="comment-item" style="display:flex;gap:15px;">
                            <img src="${c.userImg || `https://api.dicebear.com/7.x/adventurer/svg?seed=${c.user}`}" style="width:35px;height:35px;border-radius:50%;">
                            <div>
                                <h4 style="margin:0;font-size:0.9rem;color:#fff;">${c.user}</h4>
                                <p style="margin:4px 0 0 0;font-size:0.85rem;color:#ccc;">${c.text}</p>
                            </div>
                        </div>`).join('');
                });
            }
        });

        async function loadRecommendations(currentId) {
            try {
                let allDramas = JSON.parse(localStorage.getItem('dramakan_master_db'));
                allDramas = allDramas.filter(d => d.id !== currentId);
                const recs = allDramas.sort(() => 0.5 - Math.random()).slice(0, 9); 
                document.getElementById('ui-recs').innerHTML = recs.map(rec => `
                    <a href="watch.html?id=${rec.id}" class="nf-grid-item">
                        <img src="${rec.img}" alt="Poster" loading="lazy">
                    </a>
                `).join('');
            } catch(e) {}
        }
    </script>
</body>
</html>
