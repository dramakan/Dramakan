<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Login - DramaKan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-base: #09090b; --bg-surface: #18181b; --accent-gold: #d4af37; --accent-gold-hover: #f1c40f; --text-main: #f4f4f5; --text-muted: #a1a1aa; --border-subtle: rgba(255,255,255,0.08); --radius-md: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 50% 0%, #1e1e24 0%, var(--bg-base) 70%); }
        .auth-container { width: 100%; max-width: 400px; padding: 40px; background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin: 20px; }
        .brand { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 5px; letter-spacing: 1px; }
        .brand span { color: var(--accent-gold); }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .auth-input { width: 100%; padding: 14px 15px 14px 45px; background: rgba(9, 9, 11, 0.5); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 0.95rem; transition: 0.3s ease; }
        .auth-input:focus { outline: none; border-color: var(--accent-gold); background: rgba(9, 9, 11, 0.8); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
        .btn-submit { width: 100%; padding: 15px; background: var(--accent-gold); color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-submit:hover { background: var(--accent-gold-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn-google { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-google:hover { background: #f4f4f5; transform: translateY(-2px); }
        .btn-google img { width: 20px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-subtle); }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        .forgot-pass { display: block; text-align: right; font-size: 0.8rem; color: var(--accent-gold); cursor: pointer; margin-top: 5px; text-decoration: none; }
        .form-footer { text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); }
        .form-footer a { color: var(--accent-gold); text-decoration: none; font-weight: 500; }
        #msg-box { font-size: 0.85rem; text-align: center; margin-top: 15px; display: none; padding: 10px; border-radius: 6px; }
        .error { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; }
        .success { color: #10b981; background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand">Drama<span>Kan</span></div>
        <p class="subtitle">Welcome back, Partner.</p>

        <form id="login-form">
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="auth-input" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 5px;">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="auth-input" placeholder="Enter your password" required>
                </div>
                <a href="#" class="forgot-pass" id="forgot-btn">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span>Sign In</span> <i class="fas fa-sign-in-alt"></i>
            </button>
            
            <div class="divider">OR</div>

            <button type="button" class="btn-google" id="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google
            </button>
            
            <div id="msg-box"></div>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="affiliate-register.html">Apply Here</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
            authDomain: "dramakan007.firebaseapp.com",
            projectId: "dramakan007",
            storageBucket: "dramakan007.firebasestorage.app",
            messagingSenderId: "1069933586213",
            appId: "1:1069933586213:web:b28ab37436679a4906dccc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const msgBox = document.getElementById('msg-box');
        const submitBtn = document.getElementById('submit-btn');

        function showMessage(msg, type) {
            msgBox.textContent = msg;
            msgBox.className = type;
            msgBox.style.display = 'block';
        }

        let isActivelyLoggingIn = false;

        // Auto-teleport safely
        onAuthStateChanged(auth, (user) => {
            if (user && !isActivelyLoggingIn) { window.location.replace('affiliate-dashboard.html'); }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            isActivelyLoggingIn = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            msgBox.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value.trim(), document.getElementById('password').value);
                window.location.replace('affiliate-dashboard.html');
            } catch (error) {
                showMessage("Invalid email or password.", "error");
                submitBtn.innerHTML = '<span>Sign In</span> <i class="fas fa-sign-in-alt"></i>';
                isActivelyLoggingIn = false;
            }
        });

        document.getElementById('google-btn').addEventListener('click', async () => {
            isActivelyLoggingIn = true;
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const docRef = doc(db, "creators", result.user.uid);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    let baseName = result.user.displayName ? result.user.displayName.replace(/\s+/g, '') : "Creator";
                    await setDoc(docRef, {
                        creatorId: baseName,
                        email: result.user.email,
                        totalClicks: 0,
                        unpaidClicks: 0,
                        trackingUrl: `https://dramakan.site/?ref=${baseName}`,
                        createdAt: new Date()
                    });
                }
                window.location.replace('affiliate-dashboard.html');
            } catch (error) {
                showMessage("Google Sign-In failed.", "error");
                isActivelyLoggingIn = false;
            }
        });

        document.getElementById('forgot-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) { showMessage("Enter email first, then click Forgot Password.", "error"); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage("Password reset email sent! Check inbox.", "success");
            } catch (error) {
                showMessage("Error. Make sure the email is registered.", "error");
            }
        });
    </script>
</body>
</html>
