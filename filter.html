    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            /* Brand Colors */
  --primary-color: #8A2BE2;
  --primary-glow: rgba(138, 43, 226, 0.4);
            --accent-color: #8A2BE2;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }

        body { padding-bottom: 80px; }

        /* Filter Layout */
        .filter-page-container {
            display: flex;
            padding: 20px 4%;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 200px);
        }

        /* Sidebar Styling */
        .filter-sidebar {
            width: 250px;
            flex-shrink: 0;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            height: fit-content;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            position: sticky;
            top: 90px;
        }
        
        .filter-sidebar::-webkit-scrollbar { width: 6px; }
        .filter-sidebar::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); }
        .filter-header h2 { font-size: 1.2rem; color: var(--text-color); }
        .close-filter-btn { display: none; background: none; border: none; color: var(--text-color); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .close-filter-btn:hover { color: var(--accent-color); transform: rotate(90deg); }

        .filter-group { margin-bottom: 25px; }
        .filter-group h3 { font-size: 1rem; margin-bottom: 15px; color: var(--text-color); font-weight: 600; }

        .checkbox-list { display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .checkbox-list::-webkit-scrollbar { width: 5px; }
        .checkbox-list::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 5px; }
        
        .checkbox-list label { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .checkbox-list label:hover { color: var(--text-color); }

        .checkbox-list input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px; border: 2px solid var(--glass-border-light);
            border-radius: 4px; background-color: rgba(0,0,0,0.3);
            display: inline-flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.2s;
        }
        .checkbox-list input[type="checkbox"]:checked { background-color: var(--accent-color); border-color: var(--accent-color); }
        .checkbox-list input[type="checkbox"]:checked::after { content: '\2713'; font-size: 12px; color: white; font-weight: bold; }

        #clear-filters-btn {
            width: 100%; padding: 12px; background-color: transparent;
            border: 1px solid var(--accent-color); border-radius: 12px;
            color: var(--accent-color); cursor: pointer; font-weight: 600; transition: 0.3s; margin-top: 10px;
        }
        #clear-filters-btn:hover { background-color: var(--accent-color); color: white; box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); }

        /* Results Grid Styling */
        .filter-page-container section { flex-grow: 1; }
        .filter-page-container section h2 { margin-bottom: 20px; font-size: 1.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .filter-results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        
        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.1rem; background: var(--glass-bg); border-radius: 16px; border: 1px dashed var(--glass-border); }
        .rating { color: #FFD700; margin-left: 5px; font-size: 0.85rem; }

        /* THE FIX: Mobile Filter Toggle Button */
        .filter-toggle-btn {
            display: none; 
            position: fixed; bottom: 90px; right: 20px; /* Hovers above the bottom nav */
            z-index: 990; padding: 14px 24px;
            background-color: var(--accent-color); color: white;
            border: none; border-radius: 50px; font-size: 1rem; font-weight: 600;
            cursor: pointer; box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5);
            align-items: center; gap: 8px; transition: transform 0.3s;
        }
        .filter-toggle-btn:hover { transform: scale(1.05); }

        /* Media Queries for Mobile Responsiveness */
        @media (max-width: 992px) {
            .filter-page-container { flex-direction: column; padding: 20px 4%; }

            /* Show toggle button on mobile */
            .filter-toggle-btn { display: flex; }

            /* Off-canvas sidebar style on mobile */
            .filter-sidebar {
                position: fixed; top: 0; left: -110%; 
                width: 85%; max-width: 320px; height: 100vh; max-height: 100vh;
                z-index: 10000; transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
                border-radius: 0; border: none; border-right: 1px solid var(--glass-border);
                background: rgba(12, 12, 16, 0.98); padding: 30px 20px;
            }

            .filter-sidebar.active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
            .close-filter-btn { display: block; }

            /* Overlay background */
            .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 9999; display: none; opacity: 0; transition: opacity 0.3s; }
            .menu-overlay.active { display: block; opacity: 1; }

            .filter-results-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        }
    </style>
<script src="bottom-bar.js" defer></script><script src="lightmode.js"></script>

</head>
<body>
    
    <header class="main-header">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0;">
            <a href="index.html" class="logo">Drama<span>Kan</span></a>
            <a href="index.html" style="color: var(--text-muted-color); font-weight: 500; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-muted-color)'"><i class="fas fa-arrow-left"></i> Home</a>

    <button id="filter-toggle-btn" class="filter-toggle-btn">
        <i class="fas fa-filter"></i> Filters
    </button>

    <main class="filter-page-container">
        
        <aside id="filter-sidebar" class="filter-sidebar">

        </a>
    </nav>

    <script type="module" src="bottom-bar.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let allDramas = [];
            const filterGroupsContainer = document.getElementById('filter-groups');
            const resultsContainer = document.getElementById('filter-results');
            
            // Mobile UI elements
            const filterToggleBtn = document.getElementById('filter-toggle-btn');
            const filterSidebar = document.getElementById('filter-sidebar');
            const closeFilterBtn = document.getElementById('close-filter-btn');
            const clearFiltersBtn = document.getElementById('clear-filters-btn');
            const filterOverlay = document.getElementById('filter-overlay');

            // 1. Fetch data from dramas.json
            fetch('dramas.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    allDramas = data;
                    initializeFilters(allDramas);
                    renderResults(allDramas);
                })
                .catch(error => {
                    console.error('Error fetching dramas:', error);
                    resultsContainer.innerHTML = '<p class="no-results">Error loading dramas. Please check your internet connection.</p>';
                });

            // 2. Initialize filters
            function initializeFilters(dramas) {
                const genres = new Set();
                const types = new Set();
                const years = new Set();
                const platforms = new Set();

                dramas.forEach(drama => {
                    if (drama.genre) drama.genre.split(',').forEach(g => genres.add(g.trim()));
                    if (drama.type) types.add(drama.type);
                    if (drama.year) years.add(drama.year);
                    if (drama.platform) platforms.add(drama.platform);
                });

                createFilterGroup('Genre', Array.from(genres).sort());
                createFilterGroup('Type', Array.from(types).sort());
                createFilterGroup('Year', Array.from(years).sort((a, b) => b - a)); 
                createFilterGroup('Platform', Array.from(platforms).sort());
            }

            function createFilterGroup(name, options) {
                if (options.length === 0) return;
                const groupDiv = document.createElement('div');
                groupDiv.className = 'filter-group';
                groupDiv.innerHTML = `<h3>${name}</h3>`;
                const listDiv = document.createElement('div');
                listDiv.className = 'checkbox-list';

                options.forEach(option => {
                    const label = document.createElement('label');
                    const safeOption = option.toString().replace(/\s+/g, '-').toLowerCase();
                    label.innerHTML = `
                        <input type="checkbox" id="${name.toLowerCase()}-${safeOption}" name="${name.toLowerCase()}" value="${option}">
                        <span>${option}</span>
                    `;
                    label.querySelector('input').addEventListener('change', applyFilters);
                    listDiv.appendChild(label);
                });
                groupDiv.appendChild(listDiv);
                filterGroupsContainer.appendChild(groupDiv);
            }

            // 3. Apply Filters
            function applyFilters() {
                const selectedGenres = getSelectedValues('genre');
                const selectedTypes = getSelectedValues('type');
                const selectedYears = getSelectedValues('year').map(Number);
                const selectedPlatforms = getSelectedValues('platform');

                const filteredDramas = allDramas.filter(drama => {
                    const genreMatch = selectedGenres.length === 0 || (drama.genre && selectedGenres.some(g => drama.genre.includes(g)));
                    const typeMatch = selectedTypes.length === 0 || selectedTypes.includes(drama.type);
                    const yearMatch = selectedYears.length === 0 || selectedYears.includes(drama.year);
                    const platformMatch = selectedPlatforms.length === 0 || selectedPlatforms.includes(drama.platform);

                    return genreMatch && typeMatch && yearMatch && platformMatch;
                });

                renderResults(filteredDramas);
            }

            function getSelectedValues(name) {
                return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(cb => cb.value);
            }

            // 4. Render Results (Matches your new premium card CSS)
            function renderResults(dramas) {
                resultsContainer.innerHTML = '';
                if (dramas.length === 0) {
                    resultsContainer.innerHTML = '<p class="no-results"><i class="fas fa-ghost" style="font-size:3rem; margin-bottom:15px; display:block; opacity:0.5;"></i>No dramas found matching your criteria.</p>';
                    return;
                }
                dramas.forEach(drama => {
                    const card = document.createElement('a');
                    card.href = drama.link;
                    card.className = 'drama-card';
                    card.style = "min-width: 100%;";
                    
                    card.innerHTML = `
                        <div class="drama-card-img">
                            <img src="${drama.img}" alt="${drama.title}" loading="lazy">
                        </div>
                        <div class="drama-card-info">
                            <h3 class="drama-card-title">${drama.title}</h3>
                            <p class="drama-card-meta">${drama.type} • ${drama.year} <span class="rating"><i class="fa-solid fa-star"></i> ${drama.imdb || 'N/A'}</span></p>
                        </div>
                    `;
                    resultsContainer.appendChild(card);
                });
            }

            // 5. Mobile Toggle Logic
            if (filterToggleBtn) {
                filterToggleBtn.addEventListener('click', () => {
                    filterSidebar.classList.add('active');
                    filterOverlay.classList.add('active');
                    document.body.style.overflow = 'hidden'; 
                });
            }

            function closeMobileFilter() {
                filterSidebar.classList.remove('active');
                filterOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            if (closeFilterBtn) closeFilterBtn.addEventListener('click', closeMobileFilter);
            if (filterOverlay) filterOverlay.addEventListener('click', closeMobileFilter);

            clearFiltersBtn.addEventListener('click', () => {
                document.querySelectorAll('.filter-group input[type="checkbox"]').forEach(cb => cb.checked = false);
                applyFilters();
                if (window.innerWidth <= 992) closeMobileFilter();
            });
        });
    </script>
</body>
