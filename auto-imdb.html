<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DramaKan | Data Correction Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { 
            --bg-base: #0B0C10; 
            --bg-surface: rgba(26, 26, 29, 0.6); 
            --primary: #8A2BE2; 
            --primary-glow: rgba(138, 43, 226, 0.4); 
            --text-main: #F5F5F5; 
            --text-muted: #a0a0a0; 
            --border-subtle: rgba(255,255,255,0.08); 
            --success: #10b981; 
            --glass-blur: blur(20px);
        }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg-base); color: var(--text-main); margin: 0; padding: 40px 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; letter-spacing: -1px; }
        .header span { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        .stats-bar { 
            display: flex; justify-content: space-around; background: var(--bg-surface); 
            backdrop-filter: var(--glass-blur); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--border-subtle); margin-bottom: 30px; 
        }
        .stat-item b { font-size: 1.4rem; color: var(--primary); }

        .drama-card { 
            background: var(--bg-surface); border: 1px solid var(--border-subtle); 
            padding: 20px; border-radius: 20px; display: grid;
            grid-template-columns: 60px 2fr 3fr 100px; align-items: center; 
            gap: 20px; margin-bottom: 15px; transition: 0.3s;
        }
        .drama-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .drama-card img { width: 60px; height: 85px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border-subtle); }
        
        .info h4 { margin: 0; font-size: 1.1rem; color: #fff; }
        .info p { margin: 5px 0 0; font-size: 0.8rem; color: var(--text-muted); }

        .inputs { display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 10px; }
        
        input { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); 
            color: #fff; padding: 12px; border-radius: 12px; font-family: 'Poppins';
            font-size: 0.9rem; transition: 0.3s; width: 100%;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        
        .save-btn { 
            background: var(--primary); color: white; border: none; 
            height: 50px; border-radius: 12px; cursor: pointer; 
            font-weight: 600; transition: 0.3s; box-shadow: 0 4px 15px var(--primary-glow);
        }
        .save-btn:hover { background: #9d4edd; transform: scale(1.05); }
        .save-btn.done { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }

        #loading { text-align: center; padding: 100px; font-size: 1.2rem; color: var(--text-muted); }
    </style>
<script src="bottom-bar.js" defer></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Drama<span>Kan</span> Data Fixer</h1>
        <p>Correcting IMDB IDs, Seasons, and Episodes</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">Total: <b id="totalCount">0</b></div>
        <div class="stat-item">Needs IMDB: <b id="needFixCount">0</b></div>
    </div>

    <div id="loading"><i class="fas fa-circle-notch fa-spin"></i> Accessing Firestore...</div>
    <div id="dramaList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Same config as your admin dashboard
    const firebaseConfig = { 
        apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", 
        authDomain: "dramakan007.firebaseapp.com", 
        projectId: "dramakan007" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);

    const dramaListEl = document.getElementById('dramaList');
    const loadingEl = document.getElementById('loading');

    async function loadBrokenDramas() {
        try {
            const snap = await getDocs(collection(db, "dramas"));
            const allDramas = [];
            snap.forEach(d => allDramas.push({ id: d.id, ...d.data() }));

            document.getElementById('totalCount').innerText = allDramas.length;
            
            // Filter: Shows anything missing IMDB or having 0 episodes
            const broken = allDramas.filter(d => !d.imdbId || d.imdbId === "" || d.imdbId === "N/A" || !d.totalEps);
            document.getElementById('needFixCount').innerText = broken.length;

            loadingEl.style.display = 'none';
            dramaListEl.innerHTML = '';

            broken.forEach(drama => {
                const seasonString = (drama.seasons || []).join(', ');
                const card = document.createElement('div');
                card.className = 'drama-card';
                card.innerHTML = `
                    <img src="${drama.img}" alt="Poster">
                    <div class="info">
                        <h4>${drama.title}</h4>
                        <p>ID: ${drama.id}</p>
                    </div>
                    <div class="inputs">
                        <input type="text" placeholder="IMDB ID (e.g. tt1234567)" id="imdb-${drama.id}" value="${drama.imdbId || ''}">
                        <div class="input-row">
                            <input type="text" placeholder="Seasons (e.g. 16, 12)" id="sea-${drama.id}" value="${seasonString || drama.totalEps || '16'}">
                        </div>
                    </div>
                    <button class="save-btn" onclick="saveData('${drama.id}')" id="btn-${drama.id}">
                        <i class="fas fa-save"></i>
                    </button>
                `;
                dramaListEl.appendChild(card);
            });
        } catch (e) {
            loadingEl.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`;
        }
    }

    window.saveData = async (docId) => {
        const btn = document.getElementById(`btn-${docId}`);
        const imdb = document.getElementById(`imdb-${docId}`).value.trim();
        const seasonInput = document.getElementById(`sea-${docId}`).value.trim();

        if (!imdb) return alert("IMDB ID is required for the player to work!");

        // Convert "16, 12" string into [16, 12] array for watch.html logic
        const seasonsArr = seasonInput.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        const total = seasonsArr.reduce((a, b) => a + b, 0);

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            await updateDoc(doc(db, "dramas", docId), {
                imdbId: imdb,
                seasons: seasonsArr,
                totalEps: total
            });
            
            btn.className = 'save-btn done';
            btn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Fade out the fixed item
            setTimeout(() => {
                const card = btn.closest('.drama-card');
                card.style.opacity = '0.3';
                card.style.pointerEvents = 'none';
            }, 800);

        } catch (err) {
            alert("Update Failed: " + err.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i>';
        }
    };

    loadBrokenDramas();
</script>

</body>
</html>
