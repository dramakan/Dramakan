    <style>
        /* --- PC HEADER & AnyKan TOGGLE STYLES --- */
        .site-switcher { display: flex; align-items: center; margin-left: 10px; }
        .switcher-track { display: flex; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; padding: 4px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.3); }
        .nav-links .switcher-track .switch-btn { padding: 6px 14px !important; border-radius: 50px !important; font-size: 0.85rem !important; font-weight: 600 !important; color: #a1a1aa !important; text-decoration: none !important; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1) !important; background: transparent !important; display: inline-block; }
        .nav-links .switcher-track .switch-btn.active { background: linear-gradient(135deg, #8A2BE2 0%, #6a1b9a 100%) !important; color: #fff !important; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4) !important; }
        .nav-links .switcher-track .switch-btn:not(.active):hover { color: #fff !important; background: rgba(255,255,255,0.08) !important; }
        @media (max-width: 992px) {
            .site-switcher { margin-top: 10px; width: 100%; margin-left: 0; }
            .switcher-track { width: 100%; display: flex; justify-content: space-between; }
            .nav-links .switcher-track .switch-btn { text-align: center; flex: 1; padding: 10px 15px !important; }
            .header-right { gap: 10px; }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mSearch = document.getElementById('mobileSearchInput');
            const mResults = document.getElementById('mobileSearchResults');
            const pcSearch = document.getElementById('searchInput');
            const pcResults = document.getElementById('searchResults');
            if(mSearch && pcSearch) {
                mSearch.addEventListener('input', (e) => {
                    pcSearch.value = e.target.value;
                    pcSearch.dispatchEvent(new Event('input')); 
                });
                const observer = new MutationObserver(() => {
                    mResults.innerHTML = pcResults.innerHTML;
                    mResults.style.display = pcResults.style.display;
                });
                if(pcResults) observer.observe(pcResults, { childList: true, attributes: true, subtree: true });
            }
        });
    </script>
