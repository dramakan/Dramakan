<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dramakan — Watch Together</title>

  <!--
    ================================================================
    DRAMAKAN — Kany Integration Example
    ================================================================
    Drop-in reference for wiring kany-ui.js, drama-player.js,
    and watch-together.js into a single watch page.

    File layout expected:
      /
      ├── index.html          ← this file
      ├── kany.css
      ├── kany-ui.js
      ├── drama-player.js
      ├── watch-together.js
      └── 11314.png           ← Kany sprite sheet
    ================================================================
  -->

  <style>
    /* ── Minimal page shell — replace with your real styles ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #e2d9f3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.04em;
    }

    .player-wrapper {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(167, 139, 250, 0.18);
      box-shadow: 0 8px 48px rgba(124, 58, 237, 0.25);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 9px 20px;
      border-radius: 10px;
      border: 1px solid rgba(167, 139, 250, 0.35);
      background: rgba(124, 58, 237, 0.18);
      color: #e2d9f3;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      background: rgba(124, 58, 237, 0.45);
      transform: translateY(-1px);
    }

    button:active { transform: scale(0.97); }

    .info {
      font-size: 12px;
      color: rgba(167, 139, 250, 0.6);
      text-align: center;
      max-width: 600px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>🎬 Dramakan — Watch Together Demo</h1>

  <!-- ── Video player ── -->
  <div class="player-wrapper">
    <video
      id="drama-video"
      controls
      playsinline
      crossorigin="anonymous"
    ></video>
  </div>

  <!-- ── Demo control buttons ── -->
  <div class="controls">
    <button onclick="simulateSync()">✅ Simulate Synced</button>
    <button onclick="simulateThinking()">🤔 Simulate Thinking</button>
    <button onclick="simulateError()">❌ Simulate Error</button>
    <button onclick="simulateParty()">🎉 Simulate Party</button>
    <button onclick="window.kany.toggleMinimize()">🔲 Toggle Minimize</button>
    <button onclick="switchToServer2()">⚙️ Switch to Server 2</button>
  </div>

  <p class="info">
    Kany reacts automatically to stream errors, sync drift, and Firebase
    room events. Use the buttons above to preview each state.
  </p>

  <!-- ================================================================
       STEP 1 — Load Kany Visual Engine (non-module, loads first)
       kany-ui.js sets window.kany immediately and is ready before
       the module scripts below run.
  ================================================================ -->
  <script src="kany-ui.js"></script>

  <!-- ================================================================
       STEP 2 — Drama Player + Watch Together (ES modules)
  ================================================================ -->
  <script type="module">
    import { initDramaPlayer }   from './drama-player.js';
    import { initWatchTogether } from './watch-together.js';

    /* ── Grab video element ── */
    const video = document.getElementById('drama-video');

    /* ================================================================
       DRAMA PLAYER SETUP
       List your CDN servers in priority order.
       drama-player.js will probe each one and auto-fall-through.
    ================================================================ */
    const player = initDramaPlayer({
      videoEl: video,
      sources: [
        {
          url:   'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', // live public test HLS
          label: 'Server 1 (Primary)',
        },
        {
          url:   'https://cdn2.example.com/drama/ep1/master.m3u8',     // your real backup
          label: 'Server 2 (Backup)',
        },
        {
          url:   'https://cdn3.example.com/drama/ep1/master.m3u8',     // tertiary backup
          label: 'Server 3 (Tertiary)',
        },
      ],
      probeTimeout: 5000, // 5 s before declaring a server dead
    });

    /* ── Expose player to demo buttons ── */
    window._demoPlayer = player;

    /* ================================================================
       WATCH TOGETHER SETUP
       Replace firebaseConfig and roomId with real values.
       userId should come from your auth system.
    ================================================================ */

    /* ── Parse roomId from URL: /watch?room=abc123 ── */
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');

    if (roomId) {
      /* ── Your Firebase project config ── */
      const firebaseConfig = {
        apiKey:            'YOUR_API_KEY',
        authDomain:        'your-app.firebaseapp.com',
        databaseURL:       'https://your-app-default-rtdb.firebaseio.com',
        projectId:         'your-app',
        storageBucket:     'your-app.appspot.com',
        messagingSenderId: '123456789',
        appId:             '1:123456789:web:abc123',
      };

      /* ── Get authenticated user id (replace with your real auth) ── */
      const userId = `user_${Math.random().toString(36).slice(2, 9)}`;

      const watchSession = await initWatchTogether({
        firebaseConfig,
        roomId,
        videoEl: video,
        userId,
      });

      /* Clean up when user navigates away */
      window.addEventListener('beforeunload', () => watchSession?.destroy());
    } else {
      /* Solo watching (no room param) */
      window.kany.setState('watching', 'Solo mode — add ?room=ID to co-watch 🍿');
    }

    /* ================================================================
       CUSTOM EVENT LISTENERS
       drama-player.js and watch-together.js emit these events on
       the video element / window so you can hook analytics, subtitles, etc.
    ================================================================ */
    video.addEventListener('dramakan:sourceloaded', (e) => {
      console.log('[Page] Source loaded:', e.detail);
    });

    video.addEventListener('dramakan:sourcefailed', (e) => {
      console.warn('[Page] Source failed:', e.detail);
    });

    video.addEventListener('dramakan:allsourcesfailed', () => {
      console.error('[Page] All sources exhausted!');
    });

    window.addEventListener('kany:statechange', (e) => {
      console.log('[Kany state]', e.detail.state, '→', e.detail.text);
    });

    /* ================================================================
       DEMO BUTTON HELPERS (remove in production)
    ================================================================ */
    window.simulateSync     = () => window.kany.setState('synced',   'We are in sync! 🎉', 4000);
    window.simulateThinking = () => window.kany.setState('thinking', 'Re-syncing... 🔄');
    window.simulateError    = () => window.kany.setState('error',    'Uh oh! Server dead. Fetching backup... 🛠️');
    window.simulateParty    = () => window.kany.setState('party',    'Let\'s gooo! 🎊',    5000);
    window.switchToServer2  = () => window._demoPlayer?.switchTo(1);

  </script>

</body>
</html>
