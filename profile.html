<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - DramaKan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="indexstyle.css">
    <link rel="stylesheet" href="bottom-bar.css"> 

    <style>
        body { padding-bottom: 80px; }
        
        .profile-container { max-width: 1000px; margin: 40px auto; padding: 0 4%; animation: fadeIn 0.5s ease; }
        
        /* 1. THE NEW CLEANER, CUTER PROFILE HEADER */
        .profile-header-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border-light);
            border-radius: 30px; /* Softer, cuter edges */
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 0 60px rgba(138, 43, 226, 0.05);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 35px;
        }

        /* Subtle glowing orb in the background */
        .profile-header-card::before {
            content: ''; position: absolute; top: -50px; left: -50px;
            width: 200px; height: 200px; background: rgba(138, 43, 226, 0.3);
            border-radius: 50%; filter: blur(60px); z-index: -1;
        }

        /* Avatar Styling & Upload Button */
        .avatar-section { position: relative; flex-shrink: 0; }
        .profile-avatar-wrapper {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 25px var(--primary-glow);
            transition: transform 0.3s ease;
        }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #fff; }
        
        /* The Cute Camera Button */
        .avatar-upload-btn {
            position: absolute; bottom: 5px; right: 5px;
            background: var(--primary-color); color: white;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 3px solid #1A1A1D;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s ease;
        }
        .avatar-upload-btn:hover { transform: scale(1.1); background: #9d4edd; }
        #avatar-input { display: none; }

        /* Profile Info */
        .profile-info { flex-grow: 1; }
        .profile-name { font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 5px; letter-spacing: 0.5px; }
        .profile-email { color: var(--text-muted-color); font-size: 1rem; margin-bottom: 15px; }
        .badge-viewer {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.3), rgba(138, 43, 226, 0.1));
            color: #e0b3ff; padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
            border: 1px solid rgba(138, 43, 226, 0.4); display: inline-flex; align-items: center; gap: 6px;
        }

        .btn-logout {
            position: absolute; top: 30px; right: 30px;
            background: rgba(255, 77, 77, 0.1); color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.3); padding: 8px 18px;
            border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .btn-logout:hover { background: #ff4d4d; color: #fff; }

        /* Mobile View Adjustments */
        @media (max-width: 768px) {
            .profile-header-card { flex-direction: column; text-align: center; padding: 40px 20px; gap: 20px; }
            .btn-logout { position: relative; top: 0; right: 0; margin-top: 10px; width: 100%; }
        }

        /* 2. TABS & CONTENT */
        .profile-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted-color); font-size: 1rem; font-weight: 600; cursor: pointer; padding: 12px 24px; border-radius: 16px; transition: 0.3s; white-space: nowrap; }
        .tab-btn:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .tab-btn.active { background: var(--primary-color); color: #fff; box-shadow: 0 4px 15px var(--primary-glow); }
        
        .tab-content { display: none; animation: slideUp 0.4s ease-out forwards; opacity: 0; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Settings Form */
        .settings-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border-light); border-radius: 24px; padding: 35px; max-width: 500px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 0.9rem; color: var(--text-muted-color); margin-bottom: 8px; font-weight: 500; }
        .profile-input { width: 100%; padding: 15px 18px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 14px; color: #fff; font-family: 'Poppins'; transition: 0.3s; font-size: 1rem; }
        .profile-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 15px var(--primary-glow); background: rgba(0,0,0,0.5); }
        .btn-save { width: 100%; background: var(--primary-color); color: #fff; border: none; padding: 15px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-save:hover { background: #9d4edd; transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary-glow); }
        #msg-box { margin-top: 15px; padding: 12px; border-radius: 12px; text-align: center; font-size: 0.9rem; display: none; font-weight: 500; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted-color); background: var(--glass-bg); border-radius: 24px; border: 1px dashed var(--glass-border); }
        .empty-state i { font-size: 3.5rem; margin-bottom: 15px; color: rgba(138, 43, 226, 0.4); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" class="logo">Drama<span>Kan</span></a>
            <a href="index.html" style="color: var(--text-muted-color); font-weight: 500; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-muted-color)'"><i class="fas fa-arrow-left"></i> Home</a>
        </div>
    </header>

    <main class="profile-container">
        
        <div class="profile-header-card">
            
            <div class="avatar-section">
                <div class="profile-avatar-wrapper">
                    <img id="ui-avatar" class="profile-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Loading" alt="Avatar">
                </div>
                <label for="avatar-input" class="avatar-upload-btn" title="Change Profile Picture">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="avatar-input" accept="image/png, image/jpeg, image/webp">
            </div>

            <div class="profile-info">
                <h1 class="profile-name" id="ui-username">Loading...</h1>
                <p class="profile-email" id="ui-email">Fetching details...</p>
                <div class="badge-viewer"><i class="fas fa-gem"></i> VIP Member</div>
            </div>

            <button class="btn-logout" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="profile-tabs">
            <button class="tab-btn active" data-target="watching-tab"><i class="fas fa-play"></i> Continue Watching</button>
            <button class="tab-btn" data-target="settings-tab"><i class="fas fa-sliders-h"></i> Edit Profile</button>
        </div>

        <div id="watching-tab" class="tab-content active">
            <div class="drama-grid" id="history-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px;">
                </div>
        </div>

        <div id="settings-tab" class="tab-content">
            <div class="settings-card">
                <h3 style="margin-bottom: 25px; color: #fff; font-size: 1.4rem;">Profile Settings</h3>
                <form id="update-profile-form">
                    <div class="input-group">
                        <label>Unique Username</label>
                        <input type="text" id="edit-username" class="profile-input" required maxlength="20">
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="edit-email" class="profile-input" disabled style="opacity: 0.5; cursor: not-allowed; background: rgba(0,0,0,0.6);">
                    </div>
                    <button type="submit" class="btn-save" id="btn-save"><i class="fas fa-check-circle"></i> Save Changes</button>
                    <div id="msg-box"></div>
                </form>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fa-solid fa-house"></i><span class="nav-label">Home</span></a>
        <a href="Korean.html" class="bottom-nav-item"><i class="fa-solid fa-won-sign"></i><span class="nav-label">Korean</span></a>
        <a href="chinese.html" class="bottom-nav-item"><i class="fa-brands fa-renren"></i><span class="nav-label">Chinese</span></a>
        <a href="profile.html" class="bottom-nav-item active"><i class="fa-solid fa-user"></i><span class="nav-label">Profile</span></a>
    </nav>

    <script type="module" src="/js/bottom-bar.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
            authDomain: "dramakan007.firebaseapp.com",
            projectId: "dramakan007",
            storageBucket: "dramakan007.firebasestorage.app",
            messagingSenderId: "1069933586213",
            appId: "1:1069933586213:web:b28ab37436679a4906dccc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserDocRef = null;
        let currentUsername = "";
        let hasCustomAvatar = false;

        // --- 1. AUTHENTICATION & DATA LOAD ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    currentUserDocRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(currentUserDocRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        currentUsername = data.username;
                        
                        document.getElementById('ui-username').textContent = currentUsername;
                        document.getElementById('ui-email').textContent = data.email;
                        document.getElementById('edit-username').value = currentUsername;
                        document.getElementById('edit-email').value = data.email;
                        
                        // Load custom avatar if it exists, otherwise use the DiceBear generator
                        if (data.avatarUrl) {
                            document.getElementById('ui-avatar').src = data.avatarUrl;
                            hasCustomAvatar = true;
                        } else {
                            document.getElementById('ui-avatar').src = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(currentUsername)}`;
                            hasCustomAvatar = false;
                        }
                    } else {
                        // Failsafe for missing profiles
                        let defaultName = user.displayName ? user.displayName.replace(/\s+/g, '') : "DramaFan" + Math.floor(Math.random() * 10000);
                        await setDoc(currentUserDocRef, { username: defaultName, email: user.email, role: "viewer", createdAt: new Date() });
                        window.location.reload(); 
                    }
                } catch (error) {
                    console.error("Error loading profile:", error);
                }
            } else {
                window.location.replace('login.html');
            }
        });

        // --- 2. THE SMART AVATAR COMPRESSOR & UPLOADER ---
        // This takes a large image, shrinks it down so it fits perfectly in Firestore, and saves it.
        const avatarInput = document.getElementById('avatar-input');
        const avatarImg = document.getElementById('ui-avatar');

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show a loading state
            avatarImg.style.opacity = '0.5';

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = async function() {
                    // Create a hidden canvas to compress the image
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Max dimension of 250px keeps the file size incredibly tiny for Firestore
                    const MAX_SIZE = 250;
                    let width = img.width; let height = img.height;

                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }

                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // Convert to lightweight Base64 JPEG
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);

                    // Update UI and Database
                    avatarImg.src = compressedBase64;
                    avatarImg.style.opacity = '1';
                    hasCustomAvatar = true;

                    try {
                        await updateDoc(currentUserDocRef, { avatarUrl: compressedBase64 });
                    } catch (err) {
                        alert("Error saving picture. Please try a smaller image.");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- 3. TABS LOGIC ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // --- 4. CONTINUE WATCHING LOGIC ---
        function loadHistory() {
            const historyGrid = document.getElementById('history-grid');
            const historyObj = JSON.parse(localStorage.getItem('dramakan_history')) || {};
            const historyArr = Object.values(historyObj).sort((a, b) => b.timestamp - a.timestamp);

            if (historyArr.length === 0) {
                historyGrid.style.display = "block";
                historyGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-tv"></i>
                        <h3 style="color:#fff; margin-bottom: 5px;">Your watchlist is empty</h3>
                        <p>Go explore the homepage and find your next binge!</p>
                        <a href="index.html" class="btn-save" style="display:inline-block; width:auto; margin-top: 20px; text-decoration:none; padding: 12px 30px;">Explore Dramas</a>
                    </div>`;
                return;
            }

            historyGrid.innerHTML = historyArr.map(item => `
                <a href="${item.link}" class="drama-card" style="min-width: 100%; border-color: rgba(138, 43, 226, 0.4); box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-radius: 16px; overflow: hidden;">
                    <div class="drama-card-img" style="border-radius: 0;"><img src="${item.img}" alt="${item.title}" style="aspect-ratio: 3/4; object-fit: cover; width: 100%;"></div>
                    <div class="drama-card-info" style="padding: 12px;">
                        <h3 class="drama-card-title" style="font-size: 0.95rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.title}</h3>
                        <p class="drama-card-meta" style="color: var(--primary-color); font-size: 0.8rem; font-weight: 600;"><i class="fas fa-play"></i> Resume</p>
                    </div>
                </a>
            `).join('');
        }
        loadHistory();

        // --- 5. UPDATE USERNAME LOGIC ---
        document.getElementById('update-profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSave = document.getElementById('btn-save');
            const msgBox = document.getElementById('msg-box');
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btnSave.disabled = true;
            msgBox.style.display = 'none';

            const newUsername = document.getElementById('edit-username').value.trim();
            if (newUsername === currentUsername) {
                msgBox.textContent = "Profile updated!"; msgBox.style.background = "rgba(76, 175, 80, 0.1)"; msgBox.style.color = "#4CAF50"; msgBox.style.display = "block";
                btnSave.innerHTML = '<i class="fas fa-check-circle"></i> Save Changes'; btnSave.disabled = false; return;
            }

            try {
                const q = query(collection(db, "users"), where("username", "==", newUsername));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    msgBox.textContent = "That Username is already taken by another user!"; msgBox.style.background = "rgba(255, 77, 77, 0.1)"; msgBox.style.color = "#ff4d4d"; msgBox.style.display = "block";
                } else {
                    await updateDoc(currentUserDocRef, { username: newUsername });
                    currentUsername = newUsername;
                    document.getElementById('ui-username').textContent = currentUsername;
                    
                    // Only regenerate the DiceBear avatar if they HAVEN'T uploaded a custom one
                    if(!hasCustomAvatar) {
                        document.getElementById('ui-avatar').src = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(currentUsername)}`;
                    }

                    msgBox.textContent = "Username successfully updated!"; msgBox.style.background = "rgba(76, 175, 80, 0.1)"; msgBox.style.color = "#4CAF50"; msgBox.style.display = "block";
                }
            } catch (error) {
                msgBox.textContent = "Error saving profile. Try again."; msgBox.style.background = "rgba(255, 77, 77, 0.1)"; msgBox.style.color = "#ff4d4d"; msgBox.style.display = "block";
            } finally {
                btnSave.innerHTML = '<i class="fas fa-check-circle"></i> Save Changes'; btnSave.disabled = false;
            }
        });

        // --- 6. LOGOUT ---
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.replace('login.html'));
        });
    </script>
</body>
</html>
