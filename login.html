<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DramaKan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="indexstyle.css"> <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, rgba(138, 43, 226, 0.15) 0%, var(--background-color) 70%); }
        .btn-back { position: absolute; top: 30px; left: 4%; color: var(--text-muted-color); font-size: 1.1rem; transition: 0.3s; }
        .btn-back:hover { color: var(--primary-color); transform: translateX(-5px); }
        .auth-box { width: 100%; max-width: 420px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(138, 43, 226, 0.1); margin: 20px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header .logo { font-size: 2.2rem; display: block; margin-bottom: 5px; }
        .auth-header p { color: var(--text-muted-color); font-size: 0.95rem; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted-color); }
        .auth-input { width: 100%; padding: 14px 16px 14px 45px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-color); font-family: 'Poppins', sans-serif; transition: 0.3s; }
        .auth-input:focus { outline: none; border-color: var(--primary-color); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.15); }
        .forgot-link { display: block; text-align: right; color: var(--primary-color); font-size: 0.85rem; margin-top: 8px; transition: 0.2s; }
        .forgot-link:hover { color: #b366ff; }
        .btn-auth { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main { background: var(--primary-color); color: white; box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-main:hover { background: #9d4edd; transform: translateY(-2px); }
        .btn-google { background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-google:hover { background: #f0f0f0; transform: translateY(-2px); }
        .btn-google img { width: 20px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: var(--text-muted-color); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
        .divider::before { margin-right: 10px; } .divider::after { margin-left: 10px; }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted-color); }
        .auth-footer a { color: var(--primary-color); font-weight: 600; transition: 0.2s; }
        .auth-footer a:hover { color: #b366ff; }
        #msg-box { font-size: 0.85rem; text-align: center; margin-top: 15px; display: none; padding: 10px; border-radius: 8px; }
        .error { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); }
        .success { color: #4CAF50; background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.3); }
    </style>
<script src="bottom-bar.js" defer></script>
</head>
<body>
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="auth-box">
        <div class="auth-header"><a href="index.html" class="logo">Drama<span>Kan</span></a><p>Sign in to pick up where you left off.</p></div>
        <form id="login-form">
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" class="auth-input" placeholder="Email Address" required></div>
            <div class="input-group" style="margin-bottom: 5px;"><i class="fas fa-lock"></i><input type="password" id="password" class="auth-input" placeholder="Password" required><a href="#" class="forgot-link" id="forgot-btn">Forgot Password?</a></div>
            <button type="submit" class="btn-auth btn-main" id="submit-btn">Sign In</button>
            <div class="divider">OR</div>
            <button type="button" class="btn-auth btn-google" id="google-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google</button>
            <div id="msg-box"></div>
        </form>
        <div class="auth-footer">New to DramaKan? <a href="register.html">Sign up now.</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", authDomain: "dramakan007.firebaseapp.com", projectId: "dramakan007", storageBucket: "dramakan007.firebasestorage.app", messagingSenderId: "1069933586213", appId: "1:1069933586213:web:b28ab37436679a4906dccc" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); const googleProvider = new GoogleAuthProvider();
        const msgBox = document.getElementById('msg-box'); const submitBtn = document.getElementById('submit-btn');

        function showMessage(msg, type) { msgBox.textContent = msg; msgBox.className = type; msgBox.style.display = 'block'; }
        let isActivelyLoggingIn = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (isActivelyLoggingIn) return; // Hold the door!
                document.querySelector('.auth-box').innerHTML = `
                    <div style="text-align:center;">
                        <i class="fas fa-check-circle" style="font-size: 3.5rem; color: #10b981; margin-bottom: 15px; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);"></i>
                        <h2 style="margin-bottom: 10px; color: #fff;">Already Logged In!</h2>
                        <p style="color: var(--text-muted-color); margin-bottom: 25px; font-size: 0.9rem;">You are currently signed in as:<br><strong style="color: #fff;">${user.email}</strong></p>
                        <a href="profile.html" class="btn-auth btn-main" style="display:block; text-decoration:none; margin-bottom: 15px;"><i class="fas fa-user"></i> Go to Profile</a>
                        <button id="force-logout" class="btn-auth" style="background: rgba(255,0,0,0.1); color: #ff4d4d; border: 1px solid rgba(255,0,0,0.3);"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    </div>`;
                document.getElementById('force-logout').addEventListener('click', () => { signOut(auth).then(() => window.location.reload()); });
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); isActivelyLoggingIn = true; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...'; msgBox.style.display = 'none';
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value.trim(), document.getElementById('password').value);
                window.location.replace('profile.html');
            } catch (error) { showMessage("Invalid email or password.", "error"); submitBtn.innerHTML = 'Sign In'; isActivelyLoggingIn = false; }
        });

        document.getElementById('google-btn').addEventListener('click', async () => {
            isActivelyLoggingIn = true;
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const docRef = doc(db, "users", result.user.uid);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) {
                    let baseName = result.user.displayName || "DramaFan";
                    await setDoc(docRef, { username: baseName, email: result.user.email, role: "viewer", createdAt: new Date() });
                }
                window.location.replace('profile.html');
            } catch (error) { showMessage("Google Sign-In failed.", "error"); isActivelyLoggingIn = false; }
        });

        document.getElementById('forgot-btn').addEventListener('click', async (e) => {
            e.preventDefault(); const email = document.getElementById('email').value.trim();
            if (!email) return showMessage("Enter your email address first.", "error");
            try { await sendPasswordResetEmail(auth, email); showMessage("Password reset link sent to your email!", "success"); } 
            catch (error) { showMessage("Email not found in our system.", "error"); }
        });
    </script>
</body>
</html>
