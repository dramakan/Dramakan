<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Portal - Join DramaKan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f1c40f;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-subtle: rgba(255,255,255,0.08);
            --radius-md: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 0%, #1e1e24 0%, var(--bg-base) 70%);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .brand {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .brand span { color: var(--accent-gold); }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .auth-input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(9, 9, 11, 0.5);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: 0.3s ease;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(9, 9, 11, 0.8);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .auth-input::placeholder {
            color: #52525b;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 500;
        }
        
        #error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .auth-container { padding: 30px 20px; }
            .brand { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand">Drama<span>Kan</span> Partners</div>
        <p class="subtitle">Register to get your unique tracking link and start earning.</p>

        <form id="register-form">
            <div class="input-group">
                <label>Creator / Channel Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" id="creator-id" class="auth-input" placeholder="e.g. KpopFanatic99" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="auth-input" placeholder="hello@creator.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="auth-input" placeholder="Min. 6 characters" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span>Create Account</span> <i class="fas fa-arrow-right"></i>
            </button>
            
            <div id="error-msg"></div>
        </form>

        <div class="form-footer">
            Already have an account? <a href="affiliate-login.html">Sign In</a>
        </div>
    </div>

    <script type="module">
        // 1. Import Firebase tools directly from Google (No installation needed)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. YOUR FIREBASE KEYS GO HERE (We will get these in the next step)
       const firebaseConfig = {
  apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
  authDomain: "dramakan007.firebaseapp.com",
  projectId: "dramakan007",
  storageBucket: "dramakan007.firebasestorage.app",
  messagingSenderId: "1069933586213",
  appId: "1:1069933586213:web:b28ab37436679a4906dccc"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3. Handle the form submission
        const registerForm = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page from refreshing
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            errorMsg.style.display = 'none';

            const creatorId = document.getElementById('creator-id').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // A. Create the secure login account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // B. Create a database profile for them with 0 clicks and 0 earnings
                await setDoc(doc(db, "creators", user.uid), {
                    creatorId: creatorId,
                    email: email,
                    totalClicks: 0,
                    unpaidClicks: 0,
                    trackingUrl: `https://dramakan.site/?ref=${creatorId}`,
                    createdAt: new Date()
                });

                // C. Success! Send them to their new dashboard
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
                setTimeout(() => {
                    window.location.href = 'affiliate-dashboard.html'; // We will build this next
                }, 1000);

            } catch (error) {
                // Show errors (like "password too weak" or "email already used")
                console.error(error);
                errorMsg.textContent = error.message.replace('Firebase: ', '');
                errorMsg.style.display = 'block';
                submitBtn.innerHTML = '<span>Create Account</span> <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
